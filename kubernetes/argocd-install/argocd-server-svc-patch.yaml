apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    # AWS Network Load Balancer — lower latency than ALB, preserves client IPs
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # TLS termination at the NLB level using ACM certificate.
    # Replace the ARN with your certificate from AWS Certificate Manager.
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-south-1:123456789:certificate/REPLACE_ME"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    # Tag the NLB for cost tracking
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "Project=pricehop,Component=argocd"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080    # argocd-server listens on 8080 in --insecure mode
      protocol: TCP
