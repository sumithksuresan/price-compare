apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pricehop

resources:
- manifests/namespace.yaml
- manifests/secrets.yaml
- manifests/pvcs.yaml
- manifests/auth-service.yaml
- manifests/price-service.yaml
- manifests/frontend.yaml
- manifests/api-gateway.yaml

# CI rewrites newName (full ECR URL) and newTag (git SHA) on every push.
# The name field matches the placeholder image in the deployment manifests.
# Changing AWS_ACCOUNT_ID secret in GitHub automatically updates the ECR URL.
images:
- name: pricehop/api-gateway
  newName: 590184106649.dkr.ecr.us-east-1.amazonaws.com/pricehop/api-gateway
  newTag: 203c21a
- name: pricehop/auth-service
  newName: 590184106649.dkr.ecr.us-east-1.amazonaws.com/pricehop/auth-service
  newTag: 203c21a
- name: pricehop/frontend
  newName: 590184106649.dkr.ecr.us-east-1.amazonaws.com/pricehop/frontend
  newTag: 203c21a
- name: pricehop/price-service
  newName: 590184106649.dkr.ecr.us-east-1.amazonaws.com/pricehop/price-service
  newTag: 203c21a

labels:
- pairs:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: pricehop
