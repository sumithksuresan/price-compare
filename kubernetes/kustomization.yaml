apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pricehop

resources:
- manifests/namespace.yaml
- manifests/secrets.yaml
- manifests/auth-service.yaml
- manifests/price-service.yaml
- manifests/frontend.yaml
- manifests/api-gateway.yaml

# CI pipeline writes new git-SHA tags here on every push to main.
images:
- name: 975050132599.dkr.ecr.us-east-1.amazonaws.com/pricehop/api-gateway
  newTag: c5de53a
- name: 975050132599.dkr.ecr.us-east-1.amazonaws.com/pricehop/auth-service
  newTag: c5de53a
- name: 975050132599.dkr.ecr.us-east-1.amazonaws.com/pricehop/frontend
  newTag: c5de53a
- name: 975050132599.dkr.ecr.us-east-1.amazonaws.com/pricehop/price-service
  newTag: c5de53a

labels:
- pairs:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: pricehop
  includeSelectors: false
