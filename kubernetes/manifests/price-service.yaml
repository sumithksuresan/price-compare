apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-service
  namespace: pricehop
  labels:
    app: price-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-service
  template:
    metadata:
      labels:
        app: price-service
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: price-service
          image: 664418989617.dkr.ecr.us-east-1.amazonaws.com/pricehop/price-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: DB_PATH
              value: /data/prices.db
            - name: CACHE_TTL_SECONDS
              value: "300"
          volumeMounts:
            - name: price-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: price-data
          persistentVolumeClaim:
            claimName: price-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: price-service
  namespace: pricehop
spec:
  selector:
    app: price-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP
