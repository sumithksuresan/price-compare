events { worker_connections 1024; }

http {
  resolver 127.0.0.11 valid=30s;  # Docker internal DNS

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream frontend   { server frontend:5000; }
  upstream auth       { server auth-service:5001; }
  upstream price      { server price-service:5002; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Health check for load balancers
    location /health {
      access_log off;
      return 200 '{"status":"ok","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

    # Auth service routes
    location ~ ^/(register|login|sso|verify|me) {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_read_timeout 10s;
    }

    # Price service routes
    location ~ ^/(search|trending|platforms|watchlist) {
      limit_req zone=search burst=20 nodelay;
      proxy_pass http://price;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_read_timeout 15s;
    }

    # Everything else → frontend
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
    }
  }
}
