name: CI — Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "kubernetes/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"

env:
  AWS_REGION: us-east-1
  ECR_BASE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/pricehop

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Lint & test each service
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, auth-service, price-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt pytest

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check services/${{ matrix.service }}/ --ignore E501 || true

      - name: Run tests
        run: |
          if [ -d "services/${{ matrix.service }}/tests" ]; then
            pytest services/${{ matrix.service }}/tests/ -v
          else
            echo "No tests directory found — skipping"
          fi

  # ─────────────────────────────────────────────────────────────
  # 2. Build & push images to ECR (only on main)
  # ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [frontend, auth-service, price-service, api-gateway]
    outputs:
      # Each job exposes its image tag; update-manifest job collects them
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          echo "tag=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.ECR_BASE }}/${{ matrix.service }}:${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context:   services/${{ matrix.service }}
          push:      true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.ECR_BASE }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Run ECR image scan & fail on CRITICAL
        run: |
          IMAGE="${{ env.ECR_BASE }}/${{ matrix.service }}"
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="pricehop/${{ matrix.service }}"
          # Wait for scan to finish (max 60s)
          for i in $(seq 1 12); do
            STATUS=$(aws ecr describe-image-scan-findings \
              --repository-name "$REPO" --image-id imageTag="$TAG" \
              --query 'imageScanStatus.status' --output text 2>/dev/null || echo "IN_PROGRESS")
            [ "$STATUS" = "COMPLETE" ] && break
            sleep 5
          done
          CRITICAL=$(aws ecr describe-image-scan-findings \
            --repository-name "$REPO" --image-id imageTag="$TAG" \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text 2>/dev/null || echo "0")
          echo "Critical CVEs: ${CRITICAL:-0}"
          # Uncomment to block deploys on critical CVEs:
          # [ "${CRITICAL:-0}" -eq 0 ] || { echo "CRITICAL CVEs found — blocking deploy"; exit 1; }

  # ─────────────────────────────────────────────────────────────
  # 3. Update kustomization.yaml image tags and commit back
  #    → ArgoCD detects the change and auto-syncs to EKS
  # ─────────────────────────────────────────────────────────────
  update-manifest:
    name: Update manifest & trigger ArgoCD
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a deploy key / PAT so the push triggers downstream workflows
          token: ${{ secrets.GH_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in kustomization.yaml
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          BASE="${{ env.ECR_BASE }}"
          cd kubernetes

          kustomize edit set image \
            "${BASE}/frontend=${BASE}/frontend:${SHORT}" \
            "${BASE}/auth-service=${BASE}/auth-service:${SHORT}" \
            "${BASE}/price-service=${BASE}/price-service:${SHORT}" \
            "${BASE}/api-gateway=${BASE}/api-gateway:${SHORT}"

          echo "Updated kustomization.yaml:"
          grep -A2 "images:" kustomization.yaml

      - name: Commit & push manifest update
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(deploy): update image tags to ${SHORT} [skip ci]"
          git push origin main

      - name: Notify ArgoCD to sync (optional hard-sync)
        # If auto-sync is enabled in ArgoCD Application, this is redundant.
        # Useful as a fast-path for immediate deploys without waiting for ArgoCD's poll interval.
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}     # e.g. argocd.internal:443
          ARGOCD_TOKEN:  ${{ secrets.ARGOCD_AUTH_TOKEN }} # project role JWT
        run: |
          if [ -z "$ARGOCD_SERVER" ]; then
            echo "ARGOCD_SERVER not set — relying on ArgoCD auto-sync (polling interval)"
            exit 0
          fi
          curl -sk \
            -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"revision":"main","prune":true,"dryRun":false}' \
            "https://${ARGOCD_SERVER}/api/v1/applications/pricehop/sync" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Sync triggered:', d.get('status',{}).get('operationState',{}).get('phase','unknown'))"

      - name: Post deploy summary
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🚀 Deploy triggered

          | | |
          |---|---|
          | **Commit** | \`${SHORT}\` |
          | **Services** | frontend · auth-service · price-service · api-gateway |
          | **Registry** | \`${{ env.ECR_BASE }}\` |
          | **ArgoCD app** | pricehop |
          | **Sync** | Auto-sync enabled — changes will roll out within 3 min |
          EOF
